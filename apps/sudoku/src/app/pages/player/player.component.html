@if (store.isFilling()) {
  <mat-progress-bar mode="indeterminate" class="top-loading-bar"></mat-progress-bar>
}
<div class="sudokulab-page page-fill flex-row">
  <div class="page-space flex-1"></div>
  <div class="page-content" [ngClass]="layout()==='column' ? 'flex-col' : 'flex-row'">
    <div class="lateral narrow-hidden flex-1 flex-col">
      <schema-header [schema]="sudoku()"></schema-header>
      <div class="stat-monitor flex-col">
        @if (isEmpty()) {
          <div class="empty-schema" appI18n>Empty schema</div>
        } @else {
          @for (l of stat(); track l.description) {
            <div class="stat-line flex-row flex-align-start-center">
              <div class="stat-line-desc">{{ tr.t(l.description) }}</div>
              <div class="stat-line-value">{{l.value}}</div>
            </div>
          }
        }
      </div>
      <div class="highlights-container flex-1">
        <highlights-editor></highlights-editor>
      </div>
    </div>
    <div class="schema-container flex-col">
      <schema-header class="narrow-visible" [schema]="sudoku()"></schema-header>
      <div class="board-fx-wrap"
           [class.fx-playing]="fxPlaying()">
        <sudoku-board
          [logic]="logic"
          (pasteSchemaRequest)="pasteSchema($event)"
        ></sudoku-board>
        <div class="fx-cascade" aria-hidden="true">
          @for (cell of fxCells; track cell.i) {
            <div class="fx-cell" [style.animation-delay.ms]="cell.delay"></div>
          }
        </div>
      </div>
      <schema-toolbar
        [showProgress]="true"
        [template]="toolbarTemplate"
      ></schema-toolbar>
    </div>
    <div class="lateral narrow-hidden flex-1 flex-col side-tabs">
      <mat-tab-group class="full-height"
                     mat-stretch-tabs="false"
                     [dynamicHeight]="false"
                     [selectedIndex]="selectedTabIndex()"
                     (selectedIndexChange)="selectedTabIndex.set($event)">
        <mat-tab>
          <ng-template mat-tab-label><span appI18n>Let's play</span></ng-template>
          <play-panel (onAction)="onPlayAction($event)"></play-panel>
        </mat-tab>
        @if (hasSequence()) {
          <mat-tab>
            <ng-template mat-tab-label><span appI18n>Step viewer</span></ng-template>
            <step-viewer
              [sequence]="sequence()"
              (onClickItem)="openHighlights($event)"
              (onApplyItem)="manager.applyStep($event)"
            ></step-viewer>
          </mat-tab>
        }
      </mat-tab-group>
    </div>
    <div class="lateral narrow-visible flex-col side-tabs">
      <mat-tab-group mat-stretch-tabs="false"
                     [dynamicHeight]="true"
                     [selectedIndex]="selectedTabIndex()"
                     (selectedIndexChange)="selectedTabIndex.set($event)">
        <mat-tab>
          <ng-template mat-tab-label><span appI18n>Let's play</span></ng-template>
          <play-panel (onAction)="onPlayAction($event)"></play-panel>
        </mat-tab>
        @if (hasSequence()) {
          <mat-tab>
            <ng-template mat-tab-label><span appI18n>Step viewer</span></ng-template>
            <step-viewer
              [autoHeight]="true"
              [sequence]="sequence()"
              (onClickItem)="openHighlights($event)"
              (onApplyItem)="manager.applyStep($event)"
            ></step-viewer>
          </mat-tab>
        }
      </mat-tab-group>
    </div>
  </div>
  <div class="page-space flex-1"></div>
</div>
