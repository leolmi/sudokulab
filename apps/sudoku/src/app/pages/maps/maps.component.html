<div class="sudokulab-page page-fill flex-row">
  <div class="page-space flex-1"></div>
  <div class="page-content flex-col">
    <!-- HEADER -->
    <div class="header flex-row flex-align-start-center">
      @let size = gridSize();
      @if (size) {
        <div class="title flex-1">{{ tr.t('Char map') }} {{size}}x{{size}}</div>
      }
      <input class="char-input"
             [maxLength]="1" type="text"
             [value]="char()"
             (change)="applyChar($event)">
    </div>

    <!-- OPTIONS -->
    <div class="options">
      <mat-slider
        [max]="40"
        [min]="4"
        [step]="1"
        [discrete]="true"
        [showTickMarks]="true"
        aria-labelledby="fixed numbers count">
        <input matSliderThumb
               [ngModel]="size"
               (valueChange)="updateSize($event)">
      </mat-slider>
    </div>

    <!-- GRID -->
    <div class="grid">
      <svg class="svg-grid" viewBox="0 0 100 100">
        <g>
          @for (cell of cells(); track $index) {
            <rect class="svg-grid-cell"
                  (mouseenter)="over(cell)"
                  [class.active]="cell.active"
                  [attr.width]="cell.size"
                  [attr.height]="cell.size"
                  [attr.x]="cell.x"
                  [attr.y]="cell.y"
                  (click)="toggle(cell)"
            ></rect>
          }
        </g>
      </svg>
    </div>

    <!-- TOOLBAR -->
    <div class="toolbar flex-row flex-align-start-center">
      <div class="flex-1"></div>
      @let ac = activeCell();
      @if (ac) {
        <div class="position">{{ac.posX}},{{ac.posY}}</div>
      }
    </div>
  </div>
  <div class="page-space flex-1"></div>
</div>
