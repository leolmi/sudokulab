<div class="sudokulab-page sudokulab-page-print flex-row">
  <div class="print-container flex-1">
    <div class="print-title">
      {{pagesCount()}}
      <span class="opacity-4"> {{ tr.t('pages with') }} </span>
      {{schemaCount()}}
      <span class="opacity-4"> {{ tr.t('schemas, on template') }} </span>
      {{template()}}
    </div>
    <div class="pages-container">
      @for (page of pages(); track page.id; let index = $index) {
        <print-page [pageId]="page.id" [index]="index"></print-page>
      }
      <print-page mode="add"></print-page>
    </div>
  </div>
  <div class="schemas-browser-tool flex-col">
    <schemas-toolbar
      class="compact-hidden"
      persistenceKey="print"
      (onFilter)="setSchemas($event)"
    ></schemas-toolbar>
    <div class="schemas-container flex-1">
      <schemas-browser
        [schemas]="schemas()"
        [activeSchema]="activePageSchema()"
        [allowCompact]="true"
        (clickOnSchema)="printDocument.addSchema($event.values)"
      ></schemas-browser>
    </div>
  </div>
</div>
