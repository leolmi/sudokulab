<div class="play-panel">
  <play-card
    [title]="tr.t('Our schemas')"
    icon="apps"
    (clicked)="onRandom()">
    <p [innerHTML]="tr.t('play.random.body', { count: schemasCount() })"></p>
  </play-card>

  <play-card
    [title]="tr.t('Try to solve with an algorithm')"
    icon="psychology"
    [menuTriggerFor]="algMenu">
    <p>{{ tr.t('play.algorithm.body') }}</p>
  </play-card>

  <play-card
    [title]="tr.t('Hard schema')"
    icon="local_fire_department"
    (clicked)="onHard()">
    <p [innerHTML]="tr.t('play.hard.body')"></p>
  </play-card>

  <!-- popup elenco algoritmi, stile schemas-dialog -->
  <mat-menu #algMenu="matMenu" class="play-panel-alg-menu">
    @for (alg of algorithms; track alg.id) {
      <button mat-menu-item (click)="onAlgorithmSelected(alg)">
        <mat-icon>{{ alg.icon }}</mat-icon>
        <span>{{ alg.name }}</span>
      </button>
    }
  </mat-menu>
</div>
