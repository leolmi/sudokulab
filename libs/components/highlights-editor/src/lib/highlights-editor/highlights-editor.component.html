<div class="highlights-editor">
  <mat-form-field class="full-width full-height hide-line-ripple">
    <mat-label appI18n>highlights</mat-label>
    <textarea [cdkTextareaAutosize]="false"
              [value]="text()"
              class="full-height font-family-monospace"
              matInput
              spellcheck="false"
              autocorrect="off"
              autocapitalize="off"
              autocomplete="off"
              (input)="setText($event)"></textarea>
  </mat-form-field>
  <div class="highlights-toolbar flex-row flex-align-start-center">
    <div class="flex-1"></div>
    <button mat-icon-button
            [matTooltip]="tr.t(active() ? 'Hide highlights on the board' : 'Show highlights on the board')"
            (click)="toggleLink()">
      <mat-icon>{{active()?'visibility':'visibility_off'}}</mat-icon>
    </button>
    <button mat-icon-button
            [matTooltip]="tr.t('Clear highlights')"
            (click)="clear()">
      <mat-icon>delete_sweep</mat-icon>
    </button>
  </div>
</div>
