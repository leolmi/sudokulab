@let active = activeStep();
<h2 mat-dialog-title appI18n>Solve to step</h2>
<mat-dialog-content class="step-to-dialog-content">
  <div class="items-container">
    <cdk-virtual-scroll-viewport
      class="steps-container"
      itemSize="24">
      @for (step of items(); let index = $index; track index) {
        <div class="step-item flex-row flex-align-start-center"
             [class.active]="active === index"
             [class.secondary]="!step.value"
             (click)="clickOnItem(index)">
          <span class="step-index">{{ index + 1 }}</span>
          <span class="step-algorithm flex-1">{{ tr.t(step.description) }}</span>
          <mat-icon>{{ step.icon }}</mat-icon>
        </div>
      }
    </cdk-virtual-scroll-viewport>
  </div>
</mat-dialog-content>
<mat-dialog-actions>
  <button mat-button mat-dialog-close appI18n>Cancel</button>
  <button mat-button
          [disabled]="active === undefined"
          (click)="select()"
          cdkFocusInitial
          appI18n>Go</button>
</mat-dialog-actions>
