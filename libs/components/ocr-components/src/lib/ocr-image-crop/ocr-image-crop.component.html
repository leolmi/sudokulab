@let img = image();
@if (img) {
  @let dragId = dragging();
  <svg class="svg-image"
       xmlns="http://www.w3.org/2000/svg"
       #desktop
       width="100%" viewBox="0 0 100 100"
       (mousemove)="dragCropPoint($event)"
       (touchmove)="touchCropPoint($event)">
    <image #imageRaw width="100%" [attr.href]="img" />
    <g>
      <polygon [attr.points]="polygonPoints()" class="crop-area-polygon" />
      @for (cp of points(); track cp.id) {
        <circle class="crop-point"
                [class.dragging]="dragId === cp.id"
                r="2"
                (mousedown)="dragThis(cp)"
                (mouseup)="dragThis()"
                (touchstart)="dragThis(cp)"
                (touchend)="dragThis()"
                [attr.cx]="cp.x"
                [attr.cy]="cp.y"></circle>
      }
    </g>
  </svg>
} @else {
  <div>no image data</div>
}
